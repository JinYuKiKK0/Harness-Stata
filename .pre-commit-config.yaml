repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: import-linter
        name: import-linter
        entry: lint-imports
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest (unit only)
        entry: python -m pytest -x --tb=line -q -m "not integration"
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: custom-lint
        name: custom lint
        entry: python scripts/lint_custom.py
        language: system
        types: [python]
        pass_filenames: false
